name: Docker Build and Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE: registry.cn-shanghai.aliyuncs.com/holgercloud/holger-home

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (UTC time + short commit)
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TS=$(date -u +%Y%m%d-%H%M%S)
          echo "version=${TS}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: holgerzhang
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
